# Cloudflare Tunnel config for the Mac-hosted Jarvis.
# Copy to ~/.cloudflared/config.yml and fill in your tunnel UUID.
# See deploy/JARVIS-REMOTE.md for the full setup.

tunnel: REPLACE-WITH-TUNNEL-UUID
credentials-file: /Users/zach/.cloudflared/REPLACE-WITH-TUNNEL-UUID.json

ingress:
  - hostname: jarvis.zbautomations.ie
    service: http://localhost:3000
  # Everything else 404s.
  - service: http_status:404
